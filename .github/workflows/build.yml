name: Build Desktop Installers

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Build DMG
        run: npm run build:mac

      - name: Upload mac artifacts
        uses: actions/upload-artifact@v4
        with:
          name: talisman-forge-macos
          path: dist/*.{dmg,zip,yml,blockmap}
          if-no-files-found: warn

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Build NSIS
        run: npm run build:win

      - name: Upload windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: talisman-forge-windows
          path: dist/*
          if-no-files-found: warn

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Build Linux installers
        run: npm run build:linux

      - name: Upload linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: talisman-forge-linux
          path: dist/*
          if-no-files-found: warn
