name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Smoke
        run: npm run smoke

      - name: Build Linux artifacts
        run: npm run build:linux

      - name: Checksums
        run: npm run checksums

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*
