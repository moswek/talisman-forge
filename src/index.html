<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Talisman Forge</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="layout">
      <aside class="left rail panel">
        <div class="brand">
          <div class="glyph">✦</div>
          <div>
            <h1>Talisman Forge</h1>
            <p>Agent Workspace OS</p>
          </div>
        </div>
        <button class="action" id="new-room">+ New room</button>
        <div id="room-list" class="room-list"></div>
      </aside>

      <main class="center">
        <header class="top panel">
          <div>
            <h2 id="room-title">Command Room</h2>
            <p id="room-sub">Coordinate tasks, terminals, and agent runs in one view.</p>
          </div>
          <div class="chips">
            <span class="chip" id="meta-version">v0.1.0</span>
            <span class="chip online">Live</span>
          </div>
        </header>

        <section class="grid">
          <article class="panel card">
            <h3>Task Board</h3>
            <form id="task-form" class="inline">
              <input id="task-input" placeholder="Add task with acceptance criteria" required />
              <button>Add</button>
            </form>
            <div id="task-list" class="list"></div>
          </article>

          <article class="panel card">
            <h3>Terminal Sessions</h3>
            <form id="terminal-form" class="inline">
              <input id="terminal-input" placeholder="Start session: run tests / build / lint" required />
              <button>Queue</button>
            </form>
            <div id="terminal-list" class="list"></div>
          </article>

          <article class="panel card">
            <h3>Agent Swarm</h3>
            <form id="agent-form" class="inline">
              <input id="agent-input" placeholder="Spawn worker goal" required />
              <button>Spawn</button>
            </form>
            <div id="agent-list" class="list"></div>
          </article>

          <article class="panel card">
            <h3>Review Room</h3>
            <div class="stats" id="stats"></div>
            <textarea id="review-notes" rows="8" placeholder="Decision notes, release checklist, and ship/no-ship rationale..."></textarea>
          </article>
        </section>
      </main>

      <aside class="right rail panel">
        <h3>Context Stack</h3>
        <p class="muted">Keep the right context pinned while work runs in parallel.</p>
        <div id="context-list" class="list"></div>
        <form id="context-form" class="stack">
          <input id="context-title" placeholder="Context title" required />
          <textarea id="context-body" rows="5" placeholder="Key constraints, links, assumptions" required></textarea>
          <button>Add Context</button>
        </form>
      </aside>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
